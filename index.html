<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Explorer - Discover Your Next Read</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/ui.js"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-gray-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold">BookExplorer</a>
            <div class="hidden sm:flex space-x-1 md:space-x-8 text-sm md:text-base">
                <a href="index.html" class="hover:underline">Home</a>
                <a href="favorites.html" class="hover:underline">Favorites</a>
                <a href="about.html" class="hover:underline">About</a>
            </div>
            <button id="menuBtn" class="sm:hidden bg-gray-200 text-gray-800 px-3 py-2 rounded-md">☰</button>
        </div>
        <div id="mobileMenu" class="sm:hidden hidden px-4">
            <a href="index.html" class="block py-2 text-white hover:underline">Home</a>
            <a href="favorites.html" class="block py-2 text-white hover:underline">Favorites</a>
            <a href="about.html" class="block py-2 text-white hover:underline">About</a>
        </div>
    </nav>
    <header class="bg-gray-500 text-white py-12 md:py-20">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-4xl lg:text-6xl font-bold mb-4">Discover Your Next Great Read</h1>
            <p class="text-lg md:text-xl mb-8 opacity-90">Look through millions of books powered by the Open Library API!</p>
            <div class="max-w-xl mx-auto flex flex-col sm:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="Search by title..." class="w-full px-4 py-3 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-500 shadow-inner">
                <button id="searchBtn" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold px-8 py-3 rounded-lg transition duration-300 shadow-md">Search</button>
            </div>
        </div>
    </header>
    <main class="container mx-auto px-4 py-12 flex-grow">
        <h2 class="text-3xl font-bold mb-10 text-blue-800">Explore Books</h2>
        <div id="loading" class="hidden flex justify-center items-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>
        <div id="error" class="hidden text-red-600 text-center py-4"></div>
        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <p class="text-gray-400 col-span-full text-center">Start searching for books</p>
        </div>
    </main>
    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 BookExplorer</p>
        </div>
    </footer>
</body>
</html>
<!-- responsive grid added -->
