<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold">BookExplorer</a>
            <div class="hidden sm:flex space-x-4 md:space-x-8 text-sm md:text-base">
                <a href="index.html" class="hover:underline">Home</a>
                <a href="favorites.html" class="hover:underline">Favorites</a>
                <a href="about.html" class="hover:underline">About</a>
            </div>
            <button id="menuBtn" class="sm:hidden bg-gray-200 text-gray-800 px-3 py-2 rounded-md">☰</button>
        </div>
        <div id="mobileMenu" class="sm:hidden hidden px-4 pb-4">
            <a href="index.html" class="block py-2 text-white hover:underline">Home</a>
            <a href="favorites.html" class="block py-2 text-white hover:underline">Favorites</a>
            <a href="about.html" class="block py-2 text-white hover:underline">About</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-gray-600 text-white py-16">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Discover Your Next Book</h1>
            <p class="text-lg md:text-xl mb-8 text-gray-200">Search millions of books from the Open Library.</p>
            <!-- Search Bar -->
            <div class="flex flex-col sm:flex-row gap-3 justify-center max-w-xl mx-auto">
                <input
                    id="searchInput"
                    type="text"
                    placeholder="Search by title..."
                    class="flex-1 px-4 py-3 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-green-400"
                />
                <button
                    id="searchBtn"
                    class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition-colors"
                >
                    Search
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-10 flex-grow">

        <!-- Loading Spinner -->
        <div id="loading" class="hidden flex justify-center items-center py-20">
            <div class="w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <!-- Error / No Results Message -->
        <p id="error" class="hidden text-center text-gray-500 py-20 text-lg"></p>

        <!-- Book Grid -->
        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 BookExplorer</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/ui.js"></script>
</body>
</html>
