<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Favorites - Book Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/favoritesPage.js"></script>
    <script type="module" src="js/ui.js"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-gray-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold">BookExplorer</a>
            <div class="hidden sm:flex space-x-4 md:space-x-8 text-sm md:text-base">
                <a href="index.html" class="hover:underline">Home</a>
                <a href="favorites.html" class="hover:underline">Favorites</a>
                <a href="about.html" class="hover:underline">About</a>
            </div>
            <button id="menuBtn" class="sm:hidden bg-gray-200 text-gray-800 px-3 py-2 rounded-md">☰</button>
        </div>
        <div id="mobileMenu" class="sm:hidden hidden px-4 pb-4">
            <a href="index.html" class="block py-2 text-white hover:underline">Home</a>
            <a href="favorites.html" class="block py-2 text-white hover:underline">Favorites</a>
            <a href="about.html" class="block py-2 text-white hover:underline">About</a>
        </div>
    </nav>
    <main class="container mx-auto px-4 py-12 flex-grow">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">Your Favorite Books</h1>
        <div id="favoritesGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <p id="noFavorites" class="hidden text-blue-300 col-span-full text-center py-20">You haven't added any favorites yet.</p>
        </div>
    </main>
    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 BookExplorer</p>
        </div>
    </footer>

</html>
